<!DOCTYPE html>
<html lang="es">
<head>

<title>Ficha Médica Ocupacional – CASISO S.A.S.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;font-size:13px;background:#f0f4f8;color:#1a2a3a}
.hdr{background:linear-gradient(135deg,#0a2d5a,#1556a0);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.3px}
.hdr-sub{font-size:10px;color:#a8c8ef;margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center}
.badge{background:#1a4a80;color:#c8dfef;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.btn-hdr{font-size:11px;padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-weight:600}
.btn-g{background:#1a7a3a;color:#fff} .btn-g:hover{background:#155f2d} .btn-g:disabled{opacity:.4;cursor:default}
.btn-r{background:#7a1a1a;color:#fff} .btn-r:hover{background:#5a1414} .btn-r:disabled{opacity:.4;cursor:default}
.steps-wrap{background:#fff;border-bottom:2px solid #d0dcea;overflow-x:auto}
.steps{display:flex;min-width:max-content}
.step-btn{padding:9px 15px;font-size:11px;font-weight:600;border:none;border-bottom:3px solid transparent;background:transparent;cursor:pointer;color:#6a8aaa;white-space:nowrap;display:flex;align-items:center;gap:5px}
.step-btn.active{border-bottom-color:#1556a0;color:#1556a0;background:#f0f6ff}
.step-btn:hover:not(.active){background:#f5f8fc;color:#1556a0}
.sn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:10px;background:#d0dcea;color:#1a2a3a;flex-shrink:0}
.step-btn.active .sn{background:#1556a0;color:#fff}
.msg-bar{padding:8px 20px;font-size:12px;font-weight:500;display:none;border-left:4px solid #1e7a3a;background:#e8f5ee;color:#1e5530}
.msg-bar.warn{border-left-color:#c17a00;background:#fff8e8;color:#6a4a00}
.msg-bar.err{border-left-color:#a01a1a;background:#fceaea;color:#701010}
.main{max-width:1000px;margin:0 auto;padding:14px}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:10px;overflow:hidden}
.sec{background:#1556a0;color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:7px 14px}
.sec.sub{background:#2a6abf}.sec.pink{background:#8a3060}.sec.teal{background:#0a6a6a}.sec.gray{background:#3a4a5a}
.sb{padding:12px 14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.c2{grid-column:span 2}.c3{grid-column:span 3}.c4{grid-column:span 4}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10px;font-weight:700;color:#5a7a9a;text-transform:uppercase;letter-spacing:.3px}
.fld input,.fld select,.fld textarea{border:1.5px solid #c8d8e8;border-radius:4px;padding:5px 8px;font-size:12px;font-family:inherit;background:#fff;color:#1a2a3a;outline:none;width:100%;transition:border .12s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:#1556a0;box-shadow:0 0 0 2px rgba(21,86,160,.12)}
.fld input[readonly]{background:#f0f4f8;color:#1556a0;font-weight:700}
.fld textarea{resize:vertical;min-height:55px}
.imc-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-top:5px}
.chk-g{display:flex;flex-wrap:wrap;gap:10px;padding:5px 0}
.chi{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.chi input{width:13px;height:13px;accent-color:#1556a0;flex-shrink:0}
.sub-lbl{font-size:11px;font-weight:700;color:#1556a0;text-transform:uppercase;letter-spacing:.3px;margin-top:10px;margin-bottom:5px;padding-bottom:3px;border-bottom:1.5px solid #d0dcea}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:#e8eef8;color:#1556a0;font-weight:700;padding:5px 7px;text-align:left;border:1px solid #c8d8e8;font-size:10px;text-transform:uppercase}
.tbl td{border:1px solid #d8e4f0;padding:3px 5px;vertical-align:middle}
.tbl td input{border:none;width:100%;font-size:11px;background:transparent;outline:none;padding:2px 4px;color:#1a2a3a}
.tbl tr:nth-child(even) td{background:#f8fafd}
.tbl td.cat{font-weight:700;font-size:10px;color:#1556a0;vertical-align:top;padding-top:6px;background:#f0f6ff;white-space:nowrap}
.apt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.apt-opt{display:flex;align-items:center;gap:8px;padding:9px 12px;border:2px solid #c8d8e8;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .12s}
.apt-opt:hover{border-color:#1556a0}
.apt-APTO{border-color:#1e7a3a;background:#eaf6ee;color:#1e5530}
.apt-APTO_OBS{border-color:#c17a00;background:#fff8e8;color:#7a4a00}
.apt-APTO_LIM{border-color:#c15000;background:#fff3ec;color:#7a3000}
.apt-NO_APTO{border-color:#a01a1a;background:#fceaea;color:#701010}
.dl-box{background:#f0f6ff;border:2px dashed #90b0d8;border-radius:8px;padding:14px;margin-top:12px}
.dl-title{font-size:12px;font-weight:700;color:#1556a0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.dl-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn-dl{padding:9px 12px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:700;width:100%;transition:all .12s}
.btn-dl:disabled{opacity:.5;cursor:default}
.btn-ficha{background:#1556a0;color:#fff}.btn-ficha:hover:not(:disabled){background:#0e3d78}
.btn-cert{background:#1e7a3a;color:#fff}.btn-cert:hover:not(:disabled){background:#155a2a}
.btn-mat{background:#5a1a8a;color:#fff;width:100%;padding:9px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:700;margin-bottom:7px}
.btn-mat:hover{background:#40137a}
.btn-nuevo{background:#fff;color:#3a5a7a;border:1.5px solid #c8d8e8;width:100%;padding:7px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding:10px 14px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.btn-nav{font-size:12px;padding:7px 20px;border-radius:5px;border:1.5px solid #c8d8e8;cursor:pointer;background:#fff;color:#3a5a7a;font-weight:600}
.btn-nav:disabled{opacity:.35;cursor:default}
.btn-nav.primary{background:#1556a0;color:#fff;border-color:#1556a0}
.btn-nav.primary:hover:not(:disabled){background:#0e3d78}
.step-info{font-size:11px;color:#6a8aaa;font-weight:600}
.add-btn{font-size:11px;color:#1556a0;background:none;border:none;cursor:pointer;padding:3px 0;font-weight:600;text-decoration:underline;text-underline-offset:2px;margin-top:5px}
.rm-btn{background:none;border:none;cursor:pointer;color:#a01a1a;font-size:15px;font-weight:700;padding:0 3px}
.note{font-size:11px;color:#5a7a9a;padding:5px 9px;background:#f0f6ff;border-radius:4px;border-left:3px solid #90b0d8;margin-bottom:7px}
.lab-row{border:1px solid #d8e4f0;border-radius:5px;padding:8px;margin-bottom:7px;background:#f8fafd}
.ic{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px}
.ic label{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer}
.mat-panel{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:12px;margin-bottom:10px;border-left:4px solid #5a1a8a}
.mat-title{font-size:12px;font-weight:700;color:#5a1a8a;margin-bottom:3px}
.mat-sub{font-size:11px;color:#6a5a8a}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
.btn-borrador{background:#0e7a5a;color:#fff;width:100%;padding:9px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:700;margin-bottom:7px}
.btn-borrador:hover:not(:disabled){background:#0a5c43}
.btn-eliminar-borrador{background:#c0392b;color:#fff;width:100%;padding:9px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:700;margin-bottom:7px;display:none}
.btn-eliminar-borrador:hover{background:#922b21}
.borrador-banner{background:#e6f7f1;border:1.5px solid #0e7a5a;border-radius:6px;padding:7px 12px;font-size:11px;color:#0a5c43;font-weight:700;margin-bottom:8px;display:none;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">🏥 FICHA MÉDICA OCUPACIONAL</div>
    <div class="hdr-sub">SNS-MSP/HCU-form.123/2025 &nbsp;|&nbsp; CASISO S.A.S. &nbsp;|&nbsp; Dr. Martín Lino Zambrano</div>
  </div>
  <div class="hdr-right">
    <span class="badge" id="badge-count">📊 Matriz: 0 registros</span>
    <button class="btn-hdr btn-g" id="btn-dl-mat" onclick="downloadMatriz()" disabled>⬇ Descargar Matriz</button>
    <button class="btn-hdr btn-r" id="btn-clr-mat" onclick="clearMatriz()" disabled>🗑 Limpiar</button>
  </div>
</div>

<div class="steps-wrap"><div class="steps" id="steps-bar"></div></div>
<div class="msg-bar" id="msg-bar"></div>

<div class="main">
  <div id="mat-panel" class="mat-panel" style="display:none">
    <div class="mat-title">📋 Registros en Matriz</div>
    <div class="mat-sub" id="mat-names"></div>
  </div>
  <div id="form-content"></div>
</div>

<script>
const STEPS=["Datos Generales","Antecedentes","Examen Clínico","Riesgos Laborales","Exámenes y Dx","Aptitud y Cierre"];
let currentStep=0;
let matrizCount=0;

const RIESGOS={
  "FÍSICO":["Temperaturas altas","Temperaturas bajas","Radiación Ionizante","Radiación No Ionizante","Ruido","Vibración","Iluminación","Ventilación","Fluido eléctrico"],
  "SEG. LOCATIVOS":["Falta de señalización, aseo, desorden"],
  "SEG. MECÁNICOS":["Atrapamiento entre Máquinas","Atrapamiento entre objetos","Caída de objetos","Caídas al mismo nivel","Caídas a diferente nivel","Pinchazos","Cortes","Choques/colisión vehicular","Atropellamientos","Proyección de fluidos","Proyección de partículas","Contacto superficies trabajo"],
  "SEG. ELÉCTRICOS":["Contacto eléctrico"],
  "QUÍMICO":["Polvos","Sólidos","Humos","Líquidos","Vapores","Aerosoles","Neblinas","Gaseosos"],
  "BIOLÓGICO":["Virus","Hongos","Bacterias","Parásitos","Exp. vectores","Exp. animales selváticos"],
  "ERGONÓMICO":["Manejo manual de cargas","Movimientos repetitivos","Posturas forzadas","Trabajos con PVD","Diseño inadecuado del puesto"],
  "PSICOSOCIAL":["Monotonía del trabajo","Sobrecarga laboral","Minuciosidad de la tarea","Alta responsabilidad","Autonomía en decisiones","Supervisión deficiente","Conflicto de rol","Falta de claridad funciones","Distribución del trabajo","Turnos rotativos","Relaciones interpersonales","Inestabilidad laboral","Amenaza delincuencial"]
};

const EF_SECCIONES=[
  {num:1,nombre:"Piel",        items:["Cicatrices","Piel y Faneras"]},
  {num:2,nombre:"Ojos",        items:["Párpados","Conjuntivas","Pupilas","Córnea","Motilidad"]},
  {num:3,nombre:"Oído",        items:["C. auditivo externo","Pabellón","Tímpanos"]},
  {num:4,nombre:"Orofaringe",  items:["Labios","Lengua","Faringe","Amígdalas","Dentadura"]},
  {num:5,nombre:"Nariz",       items:["Tabique","Cornetes","Mucosas","Senos paranasales"]},
  {num:6,nombre:"Cuello",      items:["Tiroides / masas","Movilidad"]},
  {num:7,nombre:"Tórax",       items:["Mamas","Corazón"]},
  {num:8,nombre:"Tórax/Pulm.", items:["Pulmones","Corazón","Parrilla costal"]},
  {num:9,nombre:"Abdomen",     items:["Vísceras","Pared abdominal"]},
  {num:10,nombre:"Columna",    items:["Flexibilidad","Desviación","Dolor"]},
  {num:11,nombre:"Pelvis",     items:["Pelvis","Genitales"]},
  {num:12,nombre:"Extremidades",items:["Vascular","Miembros superiores","Miembros inferiores"]},
  {num:13,nombre:"Neurológico",items:["Fuerza","Sensibilidad","Marcha","Reflejos osteotendinosos"]},
];
function initEFItems(){const r={};EF_SECCIONES.forEach(s=>s.items.forEach((it,ii)=>{r[`${s.num}|${ii}`]={checked:false,desc:""};}));return r;}
function initRiesgos(){const r={};Object.values(RIESGOS).flat().forEach(n=>{r[n]=[false,false,false,false,false,false,false];});return r;}

let form = {
  institucion:"",ruc:"",ciiu:"",establecimiento:"",nroHistoria:"",nroArchivo:"",
  primerApellido:"",segundoApellido:"",primerNombre:"",segundoNombre:"",cedula:"",
  embarazada:false,discapacidad:false,enfCatastrofica:false,adultoMayor:false,
  sexo:"",fechaNacimiento:"",edad:"",grupoSanguineo:"",lateralidad:"",
  puestoCIUO:"",fechaAtencion:"",fechaIngreso:"",fechaReintegro:"",fechaUltimoDia:"",
  tipoEvaluacion:"",motivoObs:"",
  antClinico:"",antFamiliares:"",condEspecial:"",
  autTransfusion:"",ttoHormonal:"",ttoHormonalCual:"",
  fum:"",gestas:"",partos:"",cesareas:"",abortos:"",metPlanFem:"",
  examRepMasc:"",tiempoRepMasc:"",metPlanMasc:"",
  tabacoT:"",tabacoEx:false,tabacoAbs:"",tabacoNo:false,
  alcoholT:"",alcoholEx:false,alcoholAbs:"",alcoholNo:false,
  otraSustancia:"",otraSustanciaT:"",otraSustanciaEx:false,otraSustanciaAbs:"",otraSustanciaNo:false,
  actFisica:false,actFisicaCual:"",actFisicaT:"",
  medicHabitual:false,medicHabitualCual:"",medicHabitualCantidad:"",
  ginecoNoAplica:false,
  enfermedadActual:"",
  temperatura:"",pa:"",fc:"",fr:"",spo2:"",peso:"",talla:"",imc:"",perAbdominal:"",
  examenFisicoObs:"",
  examenFisicoItems:initEFItems(),
  examenFisicoRegiones:{
    "1. Piel":{checked:false,hallazgo:""},
    "2. Ojos":{checked:false,hallazgo:""},
    "3. Oído":{checked:false,hallazgo:""},
    "4. Orofaringe":{checked:false,hallazgo:""},
    "5. Nariz":{checked:false,hallazgo:""},
    "6. Cuello":{checked:false,hallazgo:""},
    "7. Tórax/Mamas":{checked:false,hallazgo:""},
    "8. Tórax/Pulmones-Corazón":{checked:false,hallazgo:""},
    "9. Abdomen":{checked:false,hallazgo:""},
    "10. Columna":{checked:false,hallazgo:""},
    "11. Pelvis/Genitales":{checked:false,hallazgo:""},
    "12. Extremidades/Vascular":{checked:false,hallazgo:""},
    "13. Neurológico":{checked:false,hallazgo:""}
  },
  puestoRiesgo:"",actividades:["","","","","","",""],
  riesgos:initRiesgos(),
  medidasPreventivas:"",
  antLaborales:[{centro:"",actividades:"",anterior:false,actual:false,tiempo:"",incidente:false,accidente:false,ep:false,iesssi:false,iessno:false,fecha:"",especificar:""}],
  actExtraLaborales:"",
  examenes:[{nombre:"",fecha:"",resultado:""}],
  examenesObs:"",
  diagnosticos:[{cie10:"",desc:"",tipo:""},{cie10:"",desc:"",tipo:""},{cie10:"",desc:"",tipo:""},{cie10:"",desc:"",tipo:""},{cie10:"",desc:"",tipo:""},{cie10:"",desc:"",tipo:""}],
  aptitud:"",aptitudObs:"",
  recomendaciones:"",
  retiroEval:"",retiroRelacionado:"",retiroObs:"",
  nombreProf:"Dr. Martín Lino Zambrano",codigoMedico:""
};

function calcIMC(){
  const p=parseFloat(form.peso),t=parseFloat(form.talla);
  if(p>0&&t>0){const tm=t>3?t/100:t;form.imc=(p/(tm*tm)).toFixed(1);}else form.imc="";
  const el=document.getElementById('f-imc');if(el)el.value=form.imc||"";
  const b=document.getElementById('imc-badge');
  if(b&&form.imc){
    const v=parseFloat(form.imc);
    const [txt,bg,co]=v<18.5?["Bajo peso","#fff8e8","#7a4a00"]:v<25?["✓ Normal","#eaf6ee","#1e5530"]:v<30?["Sobrepeso","#fff3ec","#7a3000"]:v<35?["Obesidad I","#fceaea","#701010"]:["Obesidad II+","#7a0000","#fff"];
    b.style.cssText=`background:${bg};color:${co};display:inline-block`;
    b.textContent=`IMC ${form.imc} kg/m² — ${txt}`;
  }else if(b)b.style.display='none';
}
function calcEdad(){
  if(form.fechaNacimiento){
    const bd=new Date(form.fechaNacimiento),hoy=new Date();
    let edad=hoy.getFullYear()-bd.getFullYear();
    if(hoy.getMonth()<bd.getMonth()||(hoy.getMonth()===bd.getMonth()&&hoy.getDate()<bd.getDate()))edad--;
    form.edad=String(edad);
    const el=document.getElementById('f-edad');if(el)el.value=form.edad;
  }
}
function f(k,v){form[k]=v;if(k==='peso'||k==='talla')calcIMC();if(k==='fechaNacimiento')calcEdad();}
function setAct(i,v){form.actividades[i]=v;}
function setRiesgo(n,i,v){if(form.riesgos[n])form.riesgos[n][i]=v;}
function setAntLab(i,k,v){form.antLaborales[i][k]=v;}
function addAntLab(){form.antLaborales.push({centro:"",actividades:"",anterior:false,actual:false,tiempo:"",incidente:false,accidente:false,ep:false,iesssi:false,iessno:false,fecha:"",especificar:""});render();}
function removeAntLab(i){form.antLaborales.splice(i,1);render();}
function setExam(i,k,v){form.examenes[i][k]=v;}
function addExam(){form.examenes.push({nombre:"",fecha:"",resultado:""});render();}
function removeExam(i){if(form.examenes.length>1){form.examenes.splice(i,1);render();}}
function setDx(i,k,v){form.diagnosticos[i][k]=v;}
function setRegion(region,key,value){
  if(form.examenFisicoRegiones[region]){
    form.examenFisicoRegiones[region][key]=value;
    if(key==='checked') render();
  }
}
function setEFItem(key,field,value){
  if(!form.examenFisicoItems[key])form.examenFisicoItems[key]={checked:false,desc:""};
  form.examenFisicoItems[key][field]=value;
  if(field==='checked')render();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function inp(lbl,k,type='text',extra='',xid=''){
  return `<div class="fld"><label>${lbl}</label><input type="${type}" value="${esc(form[k]||'')}" data-key="${k}" ${xid?`id="${xid}"`:''}${extra?` ${extra}`:''} oninput="f('${k}',this.value)"></div>`;
}
function slct(lbl,k,opts){
  const v=form[k]||'';
  const o=`<option value="">— Selec. —</option>`+opts.map(op=>typeof op==='object'?`<option value="${op.v}"${v===op.v?' selected':''}>${op.l}</option>`:`<option value="${op}"${v===op?' selected':''}>${op}</option>`).join('');
  return `<div class="fld"><label>${lbl}</label><select onchange="f('${k}',this.value)">${o}</select></div>`;
}
function ta(lbl,k,rows=3){return `<div class="fld"><label>${lbl}</label><textarea rows="${rows}" oninput="f('${k}',this.value)">${esc(form[k]||'')}</textarea></div>`;}
function chkEl(lbl,k){return `<label class="chi"><input type="checkbox" ${form[k]?'checked':''} onchange="f('${k}',this.checked)">${lbl}</label>`;}
function rad(name,val,lbl,k){return `<label class="chi"><input type="radio" name="${name}" value="${val}" ${form[k]===val?'checked':''} onchange="f('${k}',this.value)">${lbl}</label>`;}

// ─── STEPS ───
function gotoStep(n){currentStep=n;render();}
function renderSteps(){
  document.getElementById('steps-bar').innerHTML=STEPS.map((s,i)=>
    `<button class="step-btn${i===currentStep?' active':''}" onclick="gotoStep(${i})"><span class="sn">${i+1}</span>${s}</button>`).join('');
}

function step0(){return `
<div class="card"><div class="sec">A. Datos del Establecimiento</div><div class="sb">
  <div class="g3" style="margin-bottom:8px">${inp('Institución del Sistema','institucion')}<div class="g2">${inp('RUC','ruc')}${inp('CIIU','ciiu')}</div></div>
  <div class="g3">${inp('Establecimiento / Centro de Trabajo','establecimiento')}${inp('N° Historia Clínica','nroHistoria')}${inp('N° Archivo','nroArchivo')}</div>
</div></div>
<div class="card"><div class="sec sub">A. Datos del Usuario</div><div class="sb">
  <div class="g4" style="margin-bottom:8px">

      let html='';

          const sec=EF_SECCIONES[si];

// ─── RENDER ───
function render(){
  renderSteps();
  const steps=[step0,step1,step2,step3,step4,step5];
  document.getElementById('form-content').innerHTML=steps[currentStep]()+`
    <div class="nav-bar">
      <button class="btn-nav" onclick="gotoStep(${currentStep-1})" ${currentStep===0?'disabled':''}>← Anterior</button>
      <span class="step-info">Paso ${currentStep+1} de ${STEPS.length} — ${STEPS[currentStep]}</span>
      <button class="btn-nav primary" onclick="gotoStep(${currentStep+1})" ${currentStep===STEPS.length-1?'disabled':''}>Siguiente →</button>
    </div>`;
}

function showMsg(txt,type='success'){
  const b=document.getElementById('msg-bar');
  b.textContent=txt;b.style.display='block';b.className='msg-bar'+(type!=='success'?` ${type}`:'');
  setTimeout(()=>b.style.display='none',6000);
}

function setBtn(id,loading){
  const b=document.getElementById(id);if(!b)return;
  b.disabled=loading;
  b.innerHTML=loading?`<span class="spin"></span> Generando...`:b.dataset.orig||b.innerHTML;
}

async function downloadFicha(){
  const btn=document.getElementById('btn-ficha');
  btn.dataset.orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spin"></span> Generando...';
  try{
    const res=await fetch('/api/descargar-ficha',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
    if(!res.ok)throw new Error(await res.text());

// ─── BORRADORES ───────────────────────────────────────────────
let _borradorActivo = false;

function _actualizarUIBorrador(activo){
  _borradorActivo = activo;
  const banner = document.getElementById('borrador-banner');
  const btnEl  = document.getElementById('btn-eliminar-borrador');
  if(banner) banner.style.display = activo ? 'block' : 'none';
  if(btnEl)  btnEl.style.display  = activo ? 'block' : 'none';
}

async function guardarBorrador(){
  const cedula = (form.cedula || form.nroHistoria || '').trim();
  if(!cedula){ showMsg('Ingresa la cédula antes de guardar el borrador.','err'); return; }
  const btn = document.getElementById('btn-guardar-borrador');
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span> Guardando...'; }
  try{
    const res = await fetch('/api/borrador/guardar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
    const data = await res.json();
    if(!data.ok) throw new Error(data.error||'Error al guardar');
    _actualizarUIBorrador(true);
    showMsg('💾 Borrador guardado. Podrás recuperarlo ingresando la cédula.');
  }catch(e){ showMsg('Error: '+e.message,'err'); }
  if(btn){ btn.disabled=false; btn.innerHTML='💾 Guardar Borrador'; }
}

async function cargarBorrador(cedula){
  try{
    const res = await fetch(`/api/borrador/${encodeURIComponent(cedula)}`);
    if(res.status===404) return;
    const data = await res.json();
    if(!data.ok) return;
    Object.assign(form, data.data);
    _actualizarUIBorrador(true);
    render();
    showMsg('📂 Borrador encontrado y cargado automáticamente.');
  }catch(e){ /* silencioso */ }
}

async function eliminarBorrador(){
  const cedula = (form.cedula || form.nroHistoria || '').trim();
  if(!cedula) return;
  if(!confirm('¿Eliminar el borrador guardado para cédula '+cedula+'?')) return;
  try{
    const res = await fetch(`/api/borrador/${encodeURIComponent(cedula)}`,{method:'DELETE'});
    const data = await res.json();
    if(!data.ok) throw new Error(data.error||'Error al eliminar');
    _actualizarUIBorrador(false);
    showMsg('🗑 Borrador eliminado correctamente.');
  }catch(e){ showMsg('Error: '+e.message,'err'); }
}

// Auto-búsqueda cuando se escribe la cédula (con debounce 600ms)
let _cedulaTimer = null;
document.addEventListener('input', function(e){
  if(e.target && e.target.dataset && e.target.dataset.key === 'cedula'){
    const val = e.target.value.trim();
    clearTimeout(_cedulaTimer);
    if(val.length >= 8){
      _cedulaTimer = setTimeout(()=>cargarBorrador(val), 600);
    }
  }
});

function updateMatrizUI(total){
  document.getElementById('badge-count').textContent=`📊 Matriz: ${total} registro${total!==1?'s':''}`;
  document.getElementById('btn-dl-mat').disabled=total===0;
  document.getElementById('btn-clr-mat').disabled=total===0;
  const panel=document.getElementById('mat-panel');
  if(total>0){
    panel.style.display='block';
    fetch('/api/conteo-matriz').then(r=>r.json()).then(data=>{
      document.getElementById('mat-names').textContent=data.nombres.join('  |  ');
    }).catch(()=>{});
  }else panel.style.display='none';
}
